name: CI

# Runs on every PR and every push to main. This is the gate that stops a
# broken change from reaching production — Netlify will auto-deploy
# whatever lands on `main`, so this workflow passing is the only thing
# standing between a bug and the live site.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build
        env:
          # Dummy values so `next build` can complete in CI without real
          # secrets. Never use these outside CI.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
          NEXTAUTH_SECRET: "ci-placeholder-secret"

  # Placeholder for when the test suite exists (Phase 1+). Wiring this in
  # now as a required check means tests become non-optional the moment
  # they're written, instead of "we'll add tests later" quietly never
  # happening.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run tests
        run: npm test --if-present
