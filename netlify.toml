[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  # Official Next.js Runtime — required for App Router, ISR (`revalidate`),
  # Image Optimization, and Middleware to work correctly on Netlify.
  # Without this plugin Next.js falls back to a static export and most
  # of this app (auth, checkout, admin dashboard) would break.
  package = "@netlify/plugin-nextjs"

# --- Scheduled Functions (Phase 2) ---
# Netlify's equivalent of Vercel Cron. Each entry below runs a Netlify
# Function on a schedule (cron syntax, UTC) instead of Vercel's
# `vercel.json` cron config. Functions referenced here don't exist yet —
# added as placeholders for when Phase 2 (installments) is built.
#
# [[scheduled.functions]]
#   name = "charge-due-installments"
#   schedule = "0 6 * * *" # 06:00 UTC = 07:00 WAT — see docs/TRD.md 8.10 on timezone handling
#
# [[scheduled.functions]]
#   name = "reconcile-paystack-transactions"
#   schedule = "0 3 * * 1" # weekly, Monday 03:00 UTC — see docs/TRD.md 8.9

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

[template.environment]
  DATABASE_URL = "Pooled Neon Postgres connection string"
  DIRECT_URL = "Direct Neon Postgres connection string"
  NEXTAUTH_SECRET = "Session encryption secret"
  NEXTAUTH_URL = "Production site URL"
  PAYSTACK_SECRET_KEY = "Paystack secret key (test or live)"
  PAYSTACK_PUBLIC_KEY = "Paystack public key (test or live)"
  PAYSTACK_WEBHOOK_SECRET = "Paystack webhook signing secret"
  RESEND_API_KEY = "Resend transactional email API key"
  CLOUDINARY_CLOUD_NAME = "Cloudinary cloud name"
  CLOUDINARY_API_KEY = "Cloudinary API key"
  CLOUDINARY_API_SECRET = "Cloudinary API secret"
  UPSTASH_REDIS_REST_URL = "Upstash Redis REST URL (rate limiting)"
  UPSTASH_REDIS_REST_TOKEN = "Upstash Redis REST token (rate limiting)"
  NEXT_PUBLIC_SENTRY_DSN = "Sentry DSN"
